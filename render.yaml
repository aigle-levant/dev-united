services:
  - type: web
    name: dev-united
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SOF_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false